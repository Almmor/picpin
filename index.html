<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicPin - 桌面图片挂件</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-container" id="app">
        <div class="title-bar" id="titleBar">
            <div class="drag-area"></div>
            <div class="title-buttons" id="titleButtons">
                <button class="btn settings-btn" id="settingsBtn" title="设置">⚙</button>
                <button class="btn pin-btn" id="pinBtn" title="置顶/取消置顶">📌</button>
                <button class="btn close-btn" id="closeBtn" title="关闭">✕</button>
            </div>
        </div>

        <div class="main-area">
            <div class="viewer-area" id="viewerArea">
                <div class="viewer-bg" id="viewerBg"></div>
                <div class="image-container" id="imageContainer">
                    <img id="mainImage" src="" alt="">
                    <div class="nav-btn nav-prev" id="prevBtn">‹</div>
                    <div class="nav-btn nav-next" id="nextBtn">›</div>
                    <div class="counter" id="counter">0 / 0</div>
                </div>

                <div class="grid-container hidden" id="gridContainer">
                    <div class="grid-list" id="gridList"></div>
                </div>

                <div class="empty-state hidden" id="emptyState">
                    <div class="empty-icon">🖼️</div>
                    <div class="empty-title">暂无图片</div>
                    <div class="empty-hint">将图片拖入窗口<br>或在设置中添加图片</div>
                </div>

                <div class="drop-zone hidden" id="dropZone">
                    <div class="drop-icon">📥</div>
                    <div class="drop-text">松开以添加图片</div>
                </div>
            </div>

            <div class="toolbar" id="toolbar">
                <button class="tool-btn" id="playBtn">▶ 播放</button>
                <select class="tool-select" id="intervalSelect">
                    <option value="1000">1秒</option>
                    <option value="3000" selected>3秒</option>
                    <option value="5000">5秒</option>
                    <option value="10000">10秒</option>
                </select>
                <button class="tool-btn" id="modeBtn">网格</button>
                <select class="tool-select" id="fitSelect">
                    <option value="contain">适应</option>
                    <option value="cover">填充</option>
                </select>
            </div>
        </div>
    </div>

    <!-- 设置面板 -->
    <div class="settings-overlay hidden" id="settingsOverlay">
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">
                <span class="settings-header-title">⚙ PicPin 设置</span>
                <button class="settings-header-close" id="settingsCloseBtn">✕</button>
            </div>
            <div class="settings-body">

                <!-- 图片管理 -->
                <div class="settings-section">
                    <div class="settings-section-title">🖼️ 图片列表</div>
                    <div class="settings-images-list" id="settingsImagesList"></div>
                    <div class="settings-row">
                        <input class="settings-input" id="settingsNewImagePath" placeholder="输入图片路径后按回车添加">
                    </div>
                </div>

                <!-- 播放设置 -->
                <div class="settings-section">
                    <div class="settings-section-title">▶ 播放</div>
                    <div class="settings-row">
                        <span class="settings-label">默认视图</span>
                        <select class="settings-select" id="settingsMode">
                            <option value="slide">轮播</option>
                            <option value="grid">网格</option>
                        </select>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">自动播放</span>
                        <label class="settings-toggle">
                            <input type="checkbox" id="settingsAutoPlay">
                            <span class="settings-toggle-slider"></span>
                        </label>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">播放间隔</span>
                        <select class="settings-select" id="settingsInterval">
                            <option value="1000">1秒</option>
                            <option value="3000">3秒</option>
                            <option value="5000">5秒</option>
                            <option value="10000">10秒</option>
                        </select>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">适应模式</span>
                        <select class="settings-select" id="settingsFit">
                            <option value="contain">适应</option>
                            <option value="cover">填充</option>
                        </select>
                    </div>
                </div>

                <!-- 窗口设置 -->
                <div class="settings-section">
                    <div class="settings-section-title">🪟 窗口</div>
                    <div class="settings-row">
                        <span class="settings-label">隐藏按钮</span>
                        <label class="settings-toggle">
                            <input type="checkbox" id="settingsHideControls">
                            <span class="settings-toggle-slider"></span>
                        </label>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">默认宽度</span>
                        <input class="settings-input" id="settingsWidth" type="number" min="150" max="800" placeholder="如 340">
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">默认高度</span>
                        <input class="settings-input" id="settingsHeight" type="number" min="150" max="800" placeholder="如 340">
                    </div>
                </div>

                <!-- 主题颜色 -->
                <div class="settings-section">
                    <div class="settings-section-title">🎨 主题颜色</div>
                    <div class="settings-color-row">
                        <span class="settings-color-label">主色</span>
                        <input class="settings-color-input" id="settingsColorPrimary" type="text" value="#ff79c6">
                        <div class="settings-color-preview" id="settingsColorPrimaryPreview" style="background-color:#ff79c6"></div>
                    </div>
                    <div class="settings-color-row">
                        <span class="settings-color-label">强调色</span>
                        <input class="settings-color-input" id="settingsColorSecondary" type="text" value="#fee101">
                        <div class="settings-color-preview" id="settingsColorSecondaryPreview" style="background-color:#fee101"></div>
                    </div>
                    <div class="settings-color-row">
                        <span class="settings-color-label">文字色</span>
                        <input class="settings-color-input" id="settingsColorText" type="text" value="#424242">
                        <div class="settings-color-preview" id="settingsColorTextPreview" style="background-color:#424242"></div>
                    </div>
                </div>

            </div>
            <div class="settings-footer">
                <button class="settings-btn settings-btn-secondary" id="settingsCancelBtn">取消</button>
                <button class="settings-btn settings-btn-primary" id="settingsSaveBtn">保存</button>
            </div>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
